<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Who Are You?</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #111118;
      --border: #2a2a3a;
      --accent: #00ffa3;
      --accent2: #7b5ea7;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --label: #00ffa3;
      --glow: 0 0 30px rgba(0, 255, 163, 0.15);
    }

    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,163,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,163,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 620px;
    }

    header {
      margin-bottom: 2rem;
      animation: fadeDown 0.6s ease both;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 0.6rem;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: var(--glow), 0 20px 60px rgba(0,0,0,0.5);
      animation: fadeUp 0.7s ease 0.1s both;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.9rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }

    .dot {
      width: 10px; 
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }
    .dot.red   { background: #ff5f57; }
    .dot.yellow{ background: #febc2e; }
    .dot.green { background: #28c840; }

    .card-title {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .info-list {
      list-style: none;
    }

    .info-item {
      display: grid;
      grid-template-columns: 160px 1fr;
      align-items: start;
      padding: 0.85rem 1.4rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
      opacity: 0;
      transform: translateX(-8px);
      animation: slideIn 0.4s ease forwards;
    }

    .info-item:last-child { 
      border-bottom: none; 
    }

    .info-item:hover {
      background: rgba(0, 255, 163, 0.04);
      transition: background 0.2s ease;
    }

    .info-label {
      font-size: 0.7rem;
      color: var(--label);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-top: 2px;
      white-space: nowrap;
    }

    .info-value {
      font-size: 0.82rem;
      color: var(--text);
      word-break: break-all;
      line-height: 1.5;
    }

    .info-value.loading {
      color: var(--muted);
      font-style: italic;
    }

    .info-value .badge {
      display: inline-block;
      background: rgba(0,255,163,0.1);
      border: 1px solid rgba(0,255,163,0.3);
      color: var(--accent);
      font-size: 0.65rem;
      padding: 1px 8px;
      border-radius: 2px;
      letter-spacing: 0.08em;
    }

    .ip-section {
      background: rgba(0,255,163,0.03);
      border-top: 1px solid var(--border);
    }

    .actions {
      margin-top: 1.5rem;
      text-align: center;
    }

    .copy-button {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.75rem 1.8rem;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--glow);
    }

    .copy-button:hover {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 25px rgba(0, 255, 163, 0.5);
      transform: translateY(-1px);
    }

    .copy-button:active {
      transform: scale(0.98);
    }

    footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeUp 0.6s ease 1s both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    /* Mobile responsiveness */
    @media (max-width: 480px) {
      body {
        padding: 1.5rem 1rem;
      }
      
      .info-item {
        grid-template-columns: 1fr;
        gap: 0.4rem;
        padding: 1rem 1.2rem;
      }
      
      .info-label {
        padding-top: 0;
        font-size: 0.65rem;
      }
      
      .info-value {
        font-size: 0.8rem;
      }
      
      .card-header {
        padding: 0.9rem 1.1rem;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>Who<span>.</span>Are<span>.</span>You<span>?</span></h1>
    <p>Your browser &amp; network fingerprint</p>
  </header>

  <div class="card">
    <div class="card-header">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="card-title">System Report</span>
    </div>

    <ul class="info-list" id="info-list">
      <!-- JS populated -->
    </ul>
  </div>

  <div class="actions">
    <button id="copy-btn" class="copy-button">📋 Copy Full Report</button>
  </div>

  <footer>Data is mostly local — IP is fetched from a public API (nothing is stored or transmitted beyond that)</footer>
</div>

<script>
  const list = document.getElementById('info-list');

  function row(label, value, extraClass = '') {
    const li = document.createElement('li');
    const index = list.children.length; // dynamic stagger
    
    li.className = `info-item ${extraClass}`.trim();
    li.style.animationDelay = `${0.25 + index * 0.07}s`;
    
    li.innerHTML = `
      <span class="info-label">${label}</span>
      <span class="info-value">${value}</span>
    `;
    
    list.appendChild(li);
    return li;
  }

  function badge(text) {
    return `<span class="badge">${text}</span>`;
  }

  // --- Browser & Device detection (improved) ---
  const ua = navigator.userAgent;

  function getBrowser(ua) {
    if (/Edg\//.test(ua))    return ['Edge', /Edg\/([\d.]+)/.exec(ua)?.[1]];
    if (/OPR\//.test(ua))    return ['Opera', /OPR\/([\d.]+)/.exec(ua)?.[1]];
    if (/Chrome\//.test(ua)) return ['Chrome', /Chrome\/([\d.]+)/.exec(ua)?.[1]];
    if (/Firefox\//.test(ua))return ['Firefox', /Firefox\/([\d.]+)/.exec(ua)?.[1]];
    if (/Safari\//.test(ua)) return ['Safari', /Version\/([\d.]+)/.exec(ua)?.[1]];
    return ['Unknown', null];
  }

  function getOS(ua) {
    if (/Windows NT 10/.test(ua)) return 'Windows 10/11';
    if (/Windows NT 6\.3/.test(ua)) return 'Windows 8.1';
    if (/Windows NT 6\.1/.test(ua)) return 'Windows 7';
    if (/Windows/.test(ua)) return 'Windows';
    if (/Mac OS X ([\d_]+)/.test(ua)) return 'macOS ' + ua.match(/Mac OS X ([\d_]+)/)[1].replace(/_/g, '.');
    if (/Android ([\d.]+)/.test(ua)) return 'Android ' + ua.match(/Android ([\d.]+)/)[1];
    if (/iPhone OS ([\d_]+)/.test(ua) || /iPad/.test(ua)) return 'iOS ' + (ua.match(/OS ([\d_]+)/)?.[1] || '').replace(/_/g, '.');
    if (/Linux/.test(ua)) return 'Linux';
    return 'Unknown OS';
  }

  function getDevice(ua) {
    if (/iPhone/.test(ua)) return 'iPhone';
    if (/iPad/.test(ua)) return 'iPad';
    if (/Android/.test(ua) && /Mobile/.test(ua)) return 'Android Phone';
    if (/Android/.test(ua)) return 'Android Tablet';
    return 'Desktop / Laptop';
  }

  const [browserName, browserVer] = getBrowser(ua);
  const os = getOS(ua);
  const device = getDevice(ua);

  // Populate static rows (IP is special)
  row('IP Address', '<span class="loading" id="ip-val">Fetching…</span>', 'ip-section');
  row('Browser', `${browserName} ${browserVer ? badge('v' + browserVer) : ''}`);
  row('OS', os);
  row('Device', device);
  
  // Extra useful fingerprint data
  row('Hardware Cores', navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} cores` : 'Unknown');
  row('Device Memory', navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'N/A');
  row('Touch Support', navigator.maxTouchPoints ? `${navigator.maxTouchPoints} points` : 'None');

  row('Language', navigator.language || 'Unknown');
  row('Languages', (navigator.languages || [navigator.language]).join(', '));
  row('Platform', navigator.platform || 'Unknown');
  row('Screen', `${screen.width} × ${screen.height} px ${badge(window.devicePixelRatio + 'x DPR')}`);
  row('Viewport', `${window.innerWidth} × ${window.innerHeight} px`);
  row('Colour Depth', screen.colorDepth + '-bit');
  row('Timezone', Intl.DateTimeFormat().resolvedOptions().timeZone);
  row('Cookies', navigator.cookieEnabled ? badge('Enabled') : badge('Disabled'));
  row('Do Not Track', navigator.doNotTrack === '1' ? badge('On') : badge('Off'));
  row('Online', navigator.onLine ? badge('Yes') : badge('No'));
  row('User Agent', `<span style="font-size:0.72rem;color:#9090a8">${ua}</span>`);

  // Fetch public IP (with better error handling)
  async function fetchIP() {
    const ipEl = document.getElementById('ip-val');
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 6000);
      
      const res = await fetch('https://api.ipify.org?format=json', { 
        signal: controller.signal 
      });
      clearTimeout(timeout);
      
      if (!res.ok) throw new Error('Network error');
      
      const data = await res.json();
      ipEl.textContent = data.ip;
      ipEl.classList.remove('loading');
    } catch (err) {
      ipEl.textContent = err.name === 'AbortError' ? 'Request timeout' : 'Unavailable';
      ipEl.classList.remove('loading');
    }
  }

  fetchIP();

  // Copy Full Report functionality
  const copyBtn = document.getElementById('copy-btn');
  
  copyBtn.addEventListener('click', () => {
    const items = document.querySelectorAll('.info-item');
    let report = '=== Who Are You? — System Fingerprint Report ===\n\n';
    
    items.forEach(item => {
      const label = item.querySelector('.info-label').textContent.trim();
      const valueEl = item.querySelector('.info-value');
      let value = valueEl.textContent.trim();
      
      if (valueEl.classList.contains('loading')) value = 'Fetching…';
      
      report += `${label.padEnd(20)}: ${value}\n`;
    });
    
    report += `\nGenerated: ${new Date().toLocaleString()}\n`;
    report += 'Nothing was stored or logged. Pure client-side fingerprint.\n';
    
    navigator.clipboard.writeText(report).then(() => {
      const original = copyBtn.innerHTML;
      copyBtn.innerHTML = '✅ COPIED TO CLIPBOARD';
      copyBtn.style.transition = 'all 0.2s ease';
      
      setTimeout(() => {
        copyBtn.innerHTML = original;
      }, 2200);
    }).catch(() => {
      // Fallback for older browsers
      const textarea = document.createElement('textarea');
      textarea.value = report;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      
      const original = copyBtn.innerHTML;
      copyBtn.innerHTML = '✅ COPIED (fallback)';
      setTimeout(() => { copyBtn.innerHTML = original; }, 2000);
    });
  });
</script>
</body>
</html>
